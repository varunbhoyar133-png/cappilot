services:
  - type: web
    name: mht-cet-cap-guide
    env: node
    plan: free
    buildCommand: npx prisma generate && npm run build
    startCommand: npx prisma db push && npx prisma db seed && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
